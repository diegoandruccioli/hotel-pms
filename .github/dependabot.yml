version: 2
updates:
  # ── Backend: Gradle (root build covers all subprojects via settings.gradle.kts) ──
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    ignore:
      # PINNED at 1.9.0 — commons-csv 1.10.0+ requires commons-io >= 2.15.0
      # (UnsynchronizedBufferedReader), which is incompatible with the commons-io
      # 2.14.0 pin in frontdesk-service's dependencyManagement (CVE-2024-47554 fix).
      # See frontdesk-service/build.gradle.kts for the full explanation.
      - dependency-name: "org.apache.commons:commons-csv"
        versions: [">=1.10.0"]

  # ── Frontend: npm ────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"

  # ── GitHub Actions workflows ─────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"

  # ── Docker base images — one entry per Dockerfile directory (no glob support) ──
  - package-ecosystem: "docker"
    directory: "/api-gateway"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/auth-service"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/billing-service"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/config-service"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/fb-service"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/frontdesk-service"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/guest-service"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
