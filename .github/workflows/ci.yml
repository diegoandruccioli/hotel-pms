name: CI Quality Gate

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - feature/secure-coding-hardening
  pull_request:
    branches:
      - main


# Opt into Node.js 24 for all JavaScript-based actions to silence
# the Node.js 20 deprecation warning (removal scheduled Sep 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── Job 1: Backend ──────────────────────────────────────────────────────────
  backend:
    name: "Backend — Build · PMD · Checkstyle · JUnit"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build all modules (PMD + Checkstyle + JUnit + JaCoCo)
        run: ./gradlew build --no-daemon

      - name: Upload test and quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: |
            **/build/reports/tests/
            **/build/reports/pmd/
            **/build/reports/checkstyle/
            **/build/reports/jacoco/
          retention-days: 14

      # Trivy and E2E jobs download this artifact to build Docker images
      # without re-running Gradle (avoids Maven Central rate limiting).
      - name: Upload Spring Boot JARs
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jars
          path: "**/build/libs/*-SNAPSHOT.jar"
          retention-days: 1
          if-no-files-found: error

  # ── Job 2: Frontend ─────────────────────────────────────────────────────────
  frontend:
    name: "Frontend — ESLint · TypeScript · Vitest"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint — zero warnings policy
        working-directory: frontend
        run: npm run lint

      - name: TypeScript check + production build
        working-directory: frontend
        run: npm run build

      - name: Unit tests — Vitest
        working-directory: frontend
        run: npm run test

  # ── Job 3: Container Image Scan ──────────────────────────────────────────────
  # Scans all 10 custom Docker images for OS/library CVEs (CRITICAL + HIGH).
  # Uses a matrix strategy to scan each image in parallel.
  # Uploads SARIF results to GitHub Security tab for centralised tracking.
  # Also runs a misconfig scan on each Dockerfile (warn-only).
  # ─────────────────────────────────────────────────────────────────────────────
  trivy:
    name: "Trivy — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [backend]
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: config-service
            dockerfile: config-service/Dockerfile
            image: hotel-pms/config-service
            context: "."
          - service: api-gateway
            dockerfile: api-gateway/Dockerfile
            image: hotel-pms/api-gateway
            context: "."
          - service: auth-service
            dockerfile: auth-service/Dockerfile
            image: hotel-pms/auth-service
            context: "."
          - service: guest-service
            dockerfile: guest-service/Dockerfile
            image: hotel-pms/guest-service
            context: "."
          - service: inventory-service
            dockerfile: inventory-service/Dockerfile
            image: hotel-pms/inventory-service
            context: "."
          - service: reservation-service
            dockerfile: reservation-service/Dockerfile
            image: hotel-pms/reservation-service
            context: "."
          - service: stay-service
            dockerfile: stay-service/Dockerfile
            image: hotel-pms/stay-service
            context: "."
          - service: billing-service
            dockerfile: billing-service/Dockerfile
            image: hotel-pms/billing-service
            context: "."
          - service: fb-service
            dockerfile: fb-service/Dockerfile
            image: hotel-pms/fb-service
            context: "."
          - service: frontend
            dockerfile: frontend/Dockerfile
            image: hotel-pms/frontend
            context: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Restore the pre-built JARs from the backend job so docker build
      # can COPY them without running Gradle (avoids Maven Central calls).
      # Frontend matrix entry ignores the JARs; its Dockerfile uses context ./frontend.
      - name: Download Spring Boot JARs
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jars
          path: .

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Build Docker image — ${{ matrix.service }}
        run: |
          docker build \
            -t ${{ matrix.image }}:ci \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}

      - name: Trivy vulnerability scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ matrix.image }}:ci"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          timeout: "10m0s"

      - name: Trivy SARIF scan — ${{ matrix.service }}
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ matrix.image }}:ci"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          timeout: "10m0s"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"

      - name: Trivy misconfig scan — ${{ matrix.service }}
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "config"
          scan-ref: "${{ matrix.dockerfile }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # ── Job 4: Third-party Image Scan ──────────────────────────────────────────
  # Warn-only scan of critical third-party images used in docker-compose.yml.
  # Non-blocking: we don't control upstream release cycles, but we want
  # visibility into CVEs in our infrastructure dependencies.
  # ─────────────────────────────────────────────────────────────────────────────
  trivy-thirdparty:
    name: "Trivy 3rd-party — ${{ matrix.image }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - postgres:15-alpine
          - redis:alpine
          - grafana/grafana:11.5.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Trivy scan — ${{ matrix.image }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ matrix.image }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          timeout: "10m0s"

      - name: Trivy SARIF scan — ${{ matrix.image }}
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ matrix.image }}"
          format: "sarif"
          output: "trivy-thirdparty-${{ strategy.job-index }}.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          timeout: "10m0s"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-thirdparty-${{ strategy.job-index }}.sarif"
          category: "trivy-thirdparty-${{ matrix.image }}"

  # ── Job 5: E2E ──────────────────────────────────────────────────────────────
  # Runs only after backend, frontend, and trivy pass.
  # Builds the full Docker stack, waits for every service to be healthy,
  # then runs Playwright E2E tests against the containerised frontend (nginx:80).
  #
  # REQUIRED SECRET: INTERNAL_HMAC_SECRET must be set in the repository's
  # Settings → Secrets and variables → Actions. Generate one with:
  #   openssl rand -hex 32
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: "E2E — Docker Stack + Playwright"
    runs-on: ubuntu-latest
    needs: [backend, frontend, trivy]
    timeout-minutes: 75
    # Cancel only the E2E job on new pushes — keeps Trivy SARIF uploads uninterrupted.
    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    env:
      INTERNAL_HMAC_SECRET: ${{ secrets.INTERNAL_HMAC_SECRET }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      CONFIG_SERVER_PASSWORD: ${{ secrets.CONFIG_SERVER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fail early and clearly if the required secret is missing
      - name: Validate INTERNAL_HMAC_SECRET
        run: |
          if [ -z "$INTERNAL_HMAC_SECRET" ]; then
            echo "::error::INTERNAL_HMAC_SECRET is not configured."
            echo "::error::Go to Settings → Secrets → Actions and add it (openssl rand -hex 32)."
            exit 1
          fi

      # Ensure all required secrets are set before the Docker stack is built.
      # If a GitHub repo secret is absent, the expression evaluates to "" and the
      # stack would fail at runtime.  Generate ephemeral values so every CI run
      # is self-contained even without secrets configured in the repository.
      #
      # JWT_SECRET      – auth-service fails fast with an empty value (T-CFG-02).
      # POSTGRES_PASSWORD – shared by postgres + all Spring datasources.
      # CONFIG_SERVER_PASSWORD – required by config-service HTTP Basic Auth (T-CFG-03).
      # INTERNAL_HMAC_SECRET   – already validated above; no fallback needed.
      - name: Ensure required CI secrets are set
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "JWT_SECRET=$(openssl rand -base64 48 | tr -d '\n')" >> "$GITHUB_ENV"
          fi
          if [ -z "$POSTGRES_PASSWORD" ]; then
            echo "POSTGRES_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"
          fi
          if [ -z "$CONFIG_SERVER_PASSWORD" ]; then
            echo "CONFIG_SERVER_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"
          fi

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      # Same key as the backend job — restores the cache populated by that job.
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # Build all Spring Boot JARs on the runner (with cached Gradle deps).
      # Dockerfiles no longer contain a Gradle build stage — they only COPY
      # the pre-built JAR, so Docker never touches Maven Central.
      - name: Build Spring Boot JARs
        run: ./gradlew build -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # type=gha is the GitHub Actions native BuildKit cache backend.
      # No filesystem write permissions needed; no manual rotation required.
      # Monitoring services (loki, grafana, prometheus, zipkin) are excluded
      # to stay within the GitHub runner's 7 GB RAM budget.
      - name: Build Docker images (with layer cache)
        run: |
          docker buildx bake \
            --file docker-compose.yml \
            --load \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            config-server auth-service guest-service inventory-service \
            reservation-service stay-service billing-service fb-service \
            api-gateway frontend

      # Playwright install runs AFTER Docker build so the 46-min cold build does
      # not consume time that would otherwise be saved for later steps.
      # On cache-hit runs this step takes ~30 s (browser already cached).
      - name: Resolve Playwright version for cache key
        id: pw-version
        working-directory: frontend
        run: |
          echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright + Chromium system dependencies
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      # Start backend services and wait for their health checks.  Frontend is
      # started separately because its nginx healthcheck is unreliable under
      # the resource pressure of a 7 GB GitHub runner; readiness is verified
      # by the polling step below instead.
      - name: Start backend stack (wait for healthy)
        run: >
          docker compose up -d --wait
          postgres redis config-server
          auth-service guest-service inventory-service
          reservation-service stay-service billing-service fb-service
          api-gateway
        timeout-minutes: 20

      # Start frontend without --wait; readiness is checked in a later step.
      - name: Start frontend container
        run: docker compose up -d frontend

      # Extra guard: confirm the gateway process is accepting connections on port 8080.
      # The actuator was moved to the internal-only management port (8090, T-CFG-01),
      # so we probe port 8080 directly and accept any HTTP response (2xx/3xx/4xx)
      # as proof that the gateway is alive. Connection failures return "000".
      - name: Wait for API Gateway to be healthy
        run: |
          echo "Polling http://localhost:8080 for any HTTP response ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:8080/ 2>/dev/null || echo "000")
            if [ "$STATUS" != "000" ]; then
              echo "API Gateway is responding (HTTP $STATUS, attempt $i)."
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 10 s ..."
            sleep 10
          done
          echo "::error::API Gateway did not become healthy within 300 s."
          exit 1

      # Poll the nginx frontend until it serves the React SPA (HTTP 200).
      # This replaces the unreliable Docker healthcheck with an explicit retry loop.
      - name: Wait for frontend (nginx) to be serving
        run: |
          echo "Polling http://localhost:80 for HTTP 200 ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:80 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is serving (HTTP 200, attempt $i)."
              exit 0
            fi
            echo "Attempt $i/30 — got HTTP $STATUS, retrying in 5 s ..."
            sleep 5
          done
          echo "::error::Frontend did not return HTTP 200 within 150 s."
          exit 1

      # Run the full Playwright suite against the Docker-hosted frontend.
      # PLAYWRIGHT_BASE_URL overrides the config default (Vite dev server)
      # so every page.goto('/') resolves to http://localhost:80/.
      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:80
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      # Dump the last 200 lines of every container log to help diagnose failures
      - name: Dump container logs on failure
        if: failure()
        run: |
          {
            echo "=== CONTAINER STATUS ==="
            docker compose ps --all
            echo ""
            echo "=== HEALTH CHECK INSPECT ==="
            for svc in config-server auth-service guest-service inventory-service reservation-service stay-service billing-service fb-service api-gateway; do
              echo "--- $svc ---"
              docker inspect "$svc" \
                --format='State={{.State.Status}} Health={{if .State.Health}}{{.State.Health.Status}} Log={{range .State.Health.Log}}[exit={{.ExitCode}} out={{.Output}}]{{end}}{{else}}none{{end}}' \
                2>/dev/null || echo "container not found"
            done
            echo ""
            echo "=== MANUAL LIVENESS (config-server) ==="
            docker exec config-server sh -c \
              'wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness; echo "exit:$?"' \
              2>&1 || echo "docker exec failed"
            echo ""
            echo "=== CONTAINER LOGS ==="
            docker compose logs --tail=2000
          } > /tmp/docker-logs.txt 2>&1 || true

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-container-logs
          path: /tmp/docker-logs.txt
          retention-days: 3

      - name: Tear down Docker stack and volumes
        if: always()
        run: docker compose down -v
