name: CI Quality Gate

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - feature/secure-coding-hardening
  pull_request:
    branches:
      - main


# Opt into Node.js 24 for all JavaScript-based actions to silence
# the Node.js 20 deprecation warning (removal scheduled Sep 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── Job 1: Backend ──────────────────────────────────────────────────────────
  backend:
    name: "Backend — Build · PMD · Checkstyle · JUnit"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build all modules (PMD + Checkstyle + JUnit + JaCoCo)
        run: ./gradlew build --no-daemon

      - name: Upload test and quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: |
            **/build/reports/tests/
            **/build/reports/pmd/
            **/build/reports/checkstyle/
            **/build/reports/jacoco/
          retention-days: 14

      # Trivy and E2E jobs download this artifact to build Docker images
      # without re-running Gradle (avoids Maven Central rate limiting).
      - name: Upload Spring Boot JARs
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jars
          path: "**/build/libs/*-SNAPSHOT.jar"
          retention-days: 1
          if-no-files-found: error

  # ── Job 2: Frontend ─────────────────────────────────────────────────────────
  frontend:
    name: "Frontend — ESLint · TypeScript · Vitest"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint — zero warnings policy
        working-directory: frontend
        run: npm run lint

      - name: TypeScript check + production build
        working-directory: frontend
        run: npm run build

      - name: Unit tests — Vitest (with coverage thresholds)
        working-directory: frontend
        run: npm run test:coverage

  # ── Job 3: Container Image Scan ──────────────────────────────────────────────
  # Scans all 10 custom Docker images for OS/library CVEs (CRITICAL + HIGH).
  # Uses a matrix strategy to scan each image in parallel.
  # Uploads SARIF results to GitHub Security tab for centralised tracking.
  # Also runs a misconfig scan on each Dockerfile (warn-only).
  # ─────────────────────────────────────────────────────────────────────────────
  trivy:
    name: "Trivy — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [backend]
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: config-service
            dockerfile: config-service/Dockerfile
            image: hotel-pms/config-service
            context: "."
          - service: api-gateway
            dockerfile: api-gateway/Dockerfile
            image: hotel-pms/api-gateway
            context: "."
          - service: auth-service
            dockerfile: auth-service/Dockerfile
            image: hotel-pms/auth-service
            context: "."
          - service: guest-service
            dockerfile: guest-service/Dockerfile
            image: hotel-pms/guest-service
            context: "."
          - service: frontdesk-service
            dockerfile: frontdesk-service/Dockerfile
            image: hotel-pms/frontdesk-service
            context: "."
          - service: billing-service
            dockerfile: billing-service/Dockerfile
            image: hotel-pms/billing-service
            context: "."
          - service: fb-service
            dockerfile: fb-service/Dockerfile
            image: hotel-pms/fb-service
            context: "."
          - service: frontend
            dockerfile: frontend/Dockerfile
            image: hotel-pms/frontend
            context: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Restore the pre-built JARs from the backend job so docker build
      # can COPY them without running Gradle (avoids Maven Central calls).
      # Frontend matrix entry ignores the JARs; its Dockerfile uses context ./frontend.
      - name: Download Spring Boot JARs
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jars
          path: .

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Build Docker image — ${{ matrix.service }}
        run: |
          docker build \
            -t ${{ matrix.image }}:ci \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}

      - name: Trivy vulnerability scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "${{ matrix.image }}:ci"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          timeout: "10m0s"

      - name: Trivy SARIF scan — ${{ matrix.service }}
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "${{ matrix.image }}:ci"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          timeout: "10m0s"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"

      - name: Trivy misconfig scan — ${{ matrix.service }}
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: "config"
          scan-ref: "${{ matrix.dockerfile }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # ── Job 4: Third-party Image Scan ──────────────────────────────────────────
  # Warn-only scan of critical third-party images used in docker-compose.yml.
  # Non-blocking: we don't control upstream release cycles, but we want
  # visibility into CVEs in our infrastructure dependencies.
  # ─────────────────────────────────────────────────────────────────────────────
  trivy-thirdparty:
    name: "Trivy 3rd-party — ${{ matrix.image }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - postgres:15-alpine
          - redis:alpine
          - grafana/grafana:11.5.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Trivy scan — ${{ matrix.image }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "${{ matrix.image }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          timeout: "10m0s"

      - name: Trivy SARIF scan — ${{ matrix.image }}
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "${{ matrix.image }}"
          format: "sarif"
          output: "trivy-thirdparty-${{ strategy.job-index }}.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          timeout: "10m0s"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-thirdparty-${{ strategy.job-index }}.sarif"
          category: "trivy-thirdparty-${{ matrix.image }}"

  # ── Job 5: E2E ──────────────────────────────────────────────────────────────
  # Runs only after backend, frontend, and trivy pass.
  # Builds the full Docker stack, waits for every service to be healthy,
  # then runs Playwright E2E tests against the containerised frontend (nginx:80).
  #
  # REQUIRED SECRET: INTERNAL_HMAC_SECRET must be set in the repository's
  # Settings → Secrets and variables → Actions. Generate one with:
  #   openssl rand -hex 32
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: "E2E — Docker Stack + Playwright"
    runs-on: ubuntu-latest
    needs: [backend, frontend, trivy]
    timeout-minutes: 75
    # Do not cancel running E2E jobs — lets playwright install complete so the
    # browser cache saves correctly. GitHub Actions keeps only the latest queued run.
    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # All Playwright tests intercept every API call via page.route() before
      # it reaches the network — no backend service is needed at runtime.
      # Only the nginx frontend image is required to serve the React SPA.
      - name: Build frontend Docker image (with layer cache)
        run: |
          docker buildx bake \
            --file docker-compose.yml \
            --load \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            frontend

      # ubuntu-latest ships google-chrome-stable — no 167 MB download needed.
      # install-deps installs only the system libs playwright needs (apt-get, fast;
      # most packages are already present on the runner image).
      - name: Install Playwright system dependencies
        working-directory: frontend
        run: npx playwright install-deps chromium

      # --no-deps prevents Compose from starting the api-gateway dependency chain.
      - name: Start frontend container
        run: docker compose up -d --no-deps frontend

      - name: Wait for frontend (nginx) to be serving
        run: |
          echo "Polling http://localhost:80 for HTTP 200 ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:80 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is serving (HTTP 200, attempt $i)."
              exit 0
            fi
            echo "Attempt $i/30 — got HTTP $STATUS, retrying in 5 s ..."
            sleep 5
          done
          echo "::error::Frontend did not return HTTP 200 within 150 s."
          exit 1

      # Run the full Playwright suite against the Docker-hosted frontend.
      # PLAYWRIGHT_BASE_URL overrides the config default (Vite dev server)
      # so every page.goto('/') resolves to http://localhost:80/.
      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:80
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Dump container logs on failure
        if: failure()
        run: |
          {
            echo "=== CONTAINER STATUS ==="
            docker compose ps --all
            echo ""
            echo "=== CONTAINER LOGS ==="
            docker compose logs --tail=500
          } > /tmp/docker-logs.txt 2>&1 || true

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-container-logs
          path: /tmp/docker-logs.txt
          retention-days: 3

      - name: Tear down Docker stack and volumes
        if: always()
        run: docker compose down -v
