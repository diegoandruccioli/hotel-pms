# Shared configuration inherited by ALL microservices via Spring Cloud Config.
# Service-specific overrides live in their own {service-name}.yml files.

management:
  metrics:
    distribution:
      # Enable histogram buckets for HTTP requests so Prometheus can compute
      # histogram_quantile() for P99 latency alerts (alert_rules.yml).
      percentiles-histogram:
        http:
          server:
            requests: true
      # Publish P50/P95/P99 percentiles in addition to the histogram.
      percentiles:
        http:
          server:
            requests: [0.5, 0.95, 0.99]
