server:
  port: 8087

jwt:
  secret: "${JWT_SECRET}"
  expiration: "${JWT_EXPIRATION:900000}"               # 15 minutes (T-AUTH-04)
  refresh-expiration: "${JWT_REFRESH_EXPIRATION:604800000}"  # 7 days

spring:
  data:
    redis:
      host: "${AUTH_REDIS_HOST:redis}"
      port: 6379

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info"
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
