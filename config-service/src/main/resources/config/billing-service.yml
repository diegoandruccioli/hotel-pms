server:
  port: 8085

application:
  config:
    # frontdesk-service consolidates the former inventory/reservation/stay
    # services (ADR-001, backup/DECISIONS.md). HotelSettingsClient still
    # reads from the stays-domain path (/api/v1/stays/settings) on it.
    frontdesk-service-url: http://frontdesk-service:8081

internal:
  hmac:
    secret: ${INTERNAL_HMAC_SECRET}

spring:
  data:
    redis:
      # Nonce store for internal HMAC anti-replay (T-GW-08). Same Redis
      # instance used by api-gateway for rate limiting, on a separate
      # key namespace (internal-auth:nonce:*).
      host: ${INTERNAL_REDIS_HOST:redis}
      port: ${INTERNAL_REDIS_PORT:6379}

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info"
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
