server:
  port: 8083

application:
  config:
    # frontdesk-service consolidates the former inventory/reservation/stay
    # services (ADR-001, backup/DECISIONS.md) — one URL now covers both the
    # StayServiceClient and ReservationClient Feign clients in guest-service.
    frontdesk-service-url: http://frontdesk-service:8081
    billing-service-url: http://billing-service:8085

internal:
  hmac:
    secret: ${INTERNAL_HMAC_SECRET}

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info"
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
