server:
  port: 8084

internal:
  hmac:
    secret: ${INTERNAL_HMAC_SECRET}

# T-STAY-03: Alloggiati Web portal credentials and URL.
# All values MUST be provided as environment variables — no defaults for credentials.
# The RestTemplate bean uses the JVM default SSL context, enforcing TLS validation.
alloggiati:
  web:
    url: ${ALLOGGIATI_WEB_URL:https://alloggiatiweb.poliziadistato.it/PortaleAlloggiati/ScopeAut.aspx}
    username: ${ALLOGGIATI_USERNAME}
    password: ${ALLOGGIATI_PASSWORD}

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info"
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
