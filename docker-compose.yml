# ============================================================
# Hotel PMS – Production-grade docker-compose
# ============================================================
# Changes from previous version:
#   • Added deploy.resources (limits + reservations) for every service
#   • Added /actuator/health/liveness healthchecks for every Spring service
#   • api-gateway depends_on all downstream services (service_healthy)
#   • Removed stale EUREKA_CLIENT_ENABLED flags (Eureka is being removed)
#   • Network Segmentation: 5 isolated networks (dmz, gateway, backend, db, observability)
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL – shared database host
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: hotel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - db-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ----------------------------------------------------------
  # PostgreSQL backup — daily pg_dumpall, gzip, retention prune
  # (ROADMAP P3). No host ports — db-network only.
  # ----------------------------------------------------------
  db-backup:
    image: postgres:15-alpine
    container_name: hotel_db_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: 14
      BACKUP_INTERVAL_SECONDS: 86400
    volumes:
      - postgres_backups:/backups
    networks:
      - db-network
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "[db-backup] starting — interval=$${BACKUP_INTERVAL_SECONDS}s retention=$${BACKUP_RETENTION_DAYS}d"
        while true; do
          ts="$$(date +%Y%m%d-%H%M%S)"
          file="/backups/hotel-pms-$${ts}.sql"
          if pg_dumpall -h postgres -U postgres -f "$${file}"; then
            gzip "$${file}"
            echo "[db-backup] $$(date -Iseconds) wrote $${file}.gz"
          else
            echo "[db-backup] $$(date -Iseconds) FAILED dump attempt"
          fi
          find /backups -name '*.sql.gz' -mtime "+$${BACKUP_RETENTION_DAYS}" -delete
          sleep "$${BACKUP_INTERVAL_SECONDS}"
        done
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ----------------------------------------------------------
  # Redis - API Gateway rate limiting + internal HMAC anti-replay
  # nonce store (T-GW-08, all 5 InternalAuthFilter validators)
  # ----------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: hotel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - gateway-network
      - backend-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M

  # ----------------------------------------------------------
  # Loki - Log Aggregation (GAP-4: aggregazione audit log SIEM)
  # ----------------------------------------------------------
  loki:
    image: grafana/loki:2.9.0
    container_name: hotel_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/config.yaml
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -T5 -q -O /dev/null http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Grafana - Dashboard SIEM (GAP-4: visualizzazione audit log)
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:11.5.0
    container_name: hotel_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Zipkin - Distributed Tracing
  # ----------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin
    container_name: hotel_zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget -T5 -q -O /dev/null http://localhost:9411/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - observability-network
      - backend-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Alertmanager - Alert routing and notification (ROADMAP P4)
  # Alerts visible at http://localhost:9093.
  # Configure email in docker/alertmanager/alertmanager.yml.
  # ----------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: hotel_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--log.level=info"
    networks:
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M

  # ----------------------------------------------------------
  # Prometheus - Metrics and Monitoring
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus
    container_name: hotel_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    depends_on:
      config-server:
        condition: service_healthy
      alertmanager:
        condition: service_started
    networks:
      - observability-network
      - backend-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Config Server
  # ----------------------------------------------------------
  config-server:
    build:
      context: .
      dockerfile: config-service/Dockerfile
    image: hotel-pms/config-service
    container_name: config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      # T-CFG-03: credentials required by consumer microservices
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # API Gateway (Spring Cloud Gateway – WebFlux / reactive)
  # ----------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: hotel-pms/api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
      # Service URIs – override with K8s ClusterIP or external URLs
      - GW_AUTH_SERVICE_URI=http://auth-service:8087
      - GW_GUEST_SERVICE_URI=http://guest-service:8083
      - GW_FRONTDESK_SERVICE_URI=http://frontdesk-service:8081
      - GW_BILLING_SERVICE_URI=http://billing-service:8085
      - GW_FB_SERVICE_URI=http://fb-service:8086
      # CORS – override for production frontend URL
      - GW_CORS_ALLOWED_ORIGINS=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      guest-service:
        condition: service_healthy
      frontdesk-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      fb-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - dmz-network
      - gateway-network
      - backend-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Auth Service
  # ----------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: hotel-pms/auth-service
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=auth-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_auth
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - gateway-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Guest Service
  # ----------------------------------------------------------
  guest-service:
    build:
      context: .
      dockerfile: guest-service/Dockerfile
    image: hotel-pms/guest-service
    container_name: guest-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=guest-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_guest
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - APPLICATION_CONFIG_FRONTDESK_SERVICE_URL=http://frontdesk-service:8081
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Frontdesk Service (rooms + reservations + stays — consolidates the
  # former inventory-service, reservation-service and stay-service;
  # see ADR-001 in backup/DECISIONS.md)
  # ----------------------------------------------------------
  frontdesk-service:
    build:
      context: .
      dockerfile: frontdesk-service/Dockerfile
    image: hotel-pms/frontdesk-service
    container_name: frontdesk-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=frontdesk-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_frontdesk
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - APPLICATION_CONFIG_GUEST_SERVICE_URL=http://guest-service:8083
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      # T-STAY-03: PS portal credentials — real values injected via .env in production
      # Obtain WsKey from: portal login -> account icon -> "Chiave Web Service"
      - ALLOGGIATI_USERNAME=${ALLOGGIATI_USERNAME:-ci_placeholder_user}
      - ALLOGGIATI_PASSWORD=${ALLOGGIATI_PASSWORD:-ci_placeholder_password}
      - ALLOGGIATI_WS_KEY=${ALLOGGIATI_WS_KEY:-ci_placeholder_wskey}
      - ALLOGGIATI_DRY_RUN=${ALLOGGIATI_DRY_RUN:-true}
      # Encrypts per-hotel Alloggiati credentials at rest (P8) — salt MUST be hex.
      - ALLOGGIATI_CREDENTIALS_ENCRYPTION_KEY=${ALLOGGIATI_CREDENTIALS_ENCRYPTION_KEY:-ci_placeholder_encryption_key}
      - ALLOGGIATI_CREDENTIALS_ENCRYPTION_SALT=${ALLOGGIATI_CREDENTIALS_ENCRYPTION_SALT:-deadbeefdeadbeefdeadbeefdeadbeef}
      - JAVA_TOOL_OPTIONS=-Xmx384m -XX:MaxMetaspaceSize=192m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Billing Service
  # ----------------------------------------------------------
  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    image: hotel-pms/billing-service
    container_name: billing-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=billing-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_billing
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # F&B Service
  # ----------------------------------------------------------
  fb-service:
    build:
      context: .
      dockerfile: fb-service/Dockerfile
    image: hotel-pms/fb-service
    container_name: fb-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=fb-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_fb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - APPLICATION_CONFIG_FRONTDESK_SERVICE_URL=http://frontdesk-service:8081
      - APPLICATION_CONFIG_BILLING_SERVICE_URL=http://billing-service:8085
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Notification Service (C1 — transactional email via SMTP)
  # Stateless: no DB. Uses Redis only for HMAC anti-replay nonce
  # store (InternalAuthFilter, T-GW-08).
  # ----------------------------------------------------------
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: hotel-pms/notification-service
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=notification-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      # SMTP — override in production with real relay credentials
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-25}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_AUTH=${SMTP_AUTH:-false}
      - SMTP_STARTTLS=${SMTP_STARTTLS:-false}
      - NOTIFICATION_FROM_ADDRESS=${NOTIFICATION_FROM_ADDRESS:-noreply@hotelpms.local}
      - NOTIFICATION_FROM_NAME=${NOTIFICATION_FROM_NAME:-Hotel PMS}
      - JAVA_TOOL_OPTIONS=-Xmx256m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Frontend (Nginx static build)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hotel-pms/frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -T10 -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - dmz-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

volumes:
  postgres_data:
  postgres_backups:
  loki_data:
  grafana_data:
  alertmanager_data:

# ============================================================
# Network Segmentation – Defense in Depth
# ============================================================
# dmz-network:          Frontend + API Gateway (public-facing layer)
# gateway-network:      API Gateway + Redis + Auth Service (rate limiting & session cache)
# backend-network:      All microservices + Config Server + Prometheus/Zipkin (internal API mesh)
#                        Redis also joins this network so all 5 InternalAuthFilter
#                        validators can reach the HMAC anti-replay nonce store (T-GW-08)
# db-network:           PostgreSQL + microservices only (transactional data, no external access)
# observability-network: Loki, Grafana, Prometheus, Zipkin + services exposing metrics
# ============================================================
networks:
  dmz-network:
    driver: bridge
  gateway-network:
    driver: bridge
  backend-network:
    driver: bridge
  db-network:
    driver: bridge
  observability-network:
    driver: bridge
