      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_fb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - APPLICATION_CONFIG_STAY_SERVICE_URL=http://stay-service:8084
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
    depends_on:
