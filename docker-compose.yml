          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Frontend (Nginx static build)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

volumes:
  postgres_data:
