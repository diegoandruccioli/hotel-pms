# ============================================================
# Hotel PMS – Production-grade docker-compose
# ============================================================
# Changes from previous version:
#   • Added deploy.resources (limits + reservations) for every service
#   • Added /actuator/health/liveness healthchecks for every Spring service
#   • api-gateway depends_on all downstream services (service_healthy)
#   • Removed stale EUREKA_CLIENT_ENABLED flags (Eureka is being removed)
#   • Network Segmentation: 5 isolated networks (dmz, gateway, backend, db, observability)
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL – shared database host
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: hotel_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - db-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ----------------------------------------------------------
  # Redis - for API Gateway Rate Limiting
  # ----------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: hotel_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - gateway-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M

  # ----------------------------------------------------------
  # Loki - Log Aggregation (GAP-4: aggregazione audit log SIEM)
  # ----------------------------------------------------------
  loki:
    image: grafana/loki:2.9.0
    container_name: hotel_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/config.yaml
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -T5 -q -O /dev/null http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Grafana - Dashboard SIEM (GAP-4: visualizzazione audit log)
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:11.5.0
    container_name: hotel_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Zipkin - Distributed Tracing
  # ----------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin
    container_name: hotel_zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget -T5 -q -O /dev/null http://localhost:9411/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - observability-network
      - backend-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Prometheus - Metrics and Monitoring
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus
    container_name: hotel_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - observability-network
      - backend-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Config Server
  # ----------------------------------------------------------
  config-server:
    build:
      context: .
      dockerfile: config-service/Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      # T-CFG-03: credentials required by consumer microservices
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx384m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # API Gateway (Spring Cloud Gateway – WebFlux / reactive)
  # ----------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - JAVA_TOOL_OPTIONS=-Xmx384m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
      # Service URIs – override with K8s ClusterIP or external URLs
      - GW_AUTH_SERVICE_URI=http://auth-service:8087
      - GW_GUEST_SERVICE_URI=http://guest-service:8083
      - GW_INVENTORY_SERVICE_URI=http://inventory-service:8081
      - GW_RESERVATION_SERVICE_URI=http://reservation-service:8082
      - GW_STAY_SERVICE_URI=http://stay-service:8084
      - GW_BILLING_SERVICE_URI=http://billing-service:8085
      - GW_FB_SERVICE_URI=http://fb-service:8086
      # CORS – override for production frontend URL
      - GW_CORS_ALLOWED_ORIGINS=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      guest-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      reservation-service:
        condition: service_healthy
      stay-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      fb-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - dmz-network
      - gateway-network
      - backend-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Auth Service
  # ----------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=auth-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_auth
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx384m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - gateway-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Guest Service
  # ----------------------------------------------------------
  guest-service:
    build:
      context: .
      dockerfile: guest-service/Dockerfile
    container_name: guest-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=guest-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_guest
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - APPLICATION_CONFIG_RESERVATION_SERVICE_URL=http://reservation-service:8082
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx384m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Stay Service
  # ----------------------------------------------------------
  stay-service:
    build:
      context: .
      dockerfile: stay-service/Dockerfile
    container_name: stay-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=stay-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_stay
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      # T-STAY-03: PS portal credentials — real values injected via .env in production
      # Obtain WsKey from: portal login -> account icon -> "Chiave Web Service"
      - ALLOGGIATI_USERNAME=${ALLOGGIATI_USERNAME:-ci_placeholder_user}
      - ALLOGGIATI_PASSWORD=${ALLOGGIATI_PASSWORD:-ci_placeholder_password}
      - ALLOGGIATI_WS_KEY=${ALLOGGIATI_WS_KEY:-ci_placeholder_wskey}
      - ALLOGGIATI_DRY_RUN=${ALLOGGIATI_DRY_RUN:-true}
      - JAVA_TOOL_OPTIONS=-Xmx384m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Billing Service
  # ----------------------------------------------------------
  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    container_name: billing-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=billing-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_billing
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx384m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # F&B Service
  # ----------------------------------------------------------
  fb-service:
    build:
      context: .
      dockerfile: fb-service/Dockerfile
    container_name: fb-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=fb-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_fb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - APPLICATION_CONFIG_STAY_SERVICE_URL=http://stay-service:8084
      - APPLICATION_CONFIG_BILLING_SERVICE_URL=http://billing-service:8085
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx384m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Inventory Service
  # ----------------------------------------------------------
  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=inventory-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_inventory
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx384m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Reservation Service
  # ----------------------------------------------------------
  reservation-service:
    build:
      context: .
      dockerfile: reservation-service/Dockerfile
    container_name: reservation-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=reservation-service
      - CONFIG_SERVER_URL=http://config-server:8888
      - CONFIG_SERVER_PASSWORD=${CONFIG_SERVER_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/hotel_reservation
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - APPLICATION_CONFIG_GUEST_SERVICE_URL=http://guest-service:8083
      - APPLICATION_CONFIG_INVENTORY_SERVICE_URL=http://inventory-service:8081
      - INTERNAL_HMAC_SECRET=${INTERNAL_HMAC_SECRET}
      - JAVA_TOOL_OPTIONS=-Xmx384m -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -T5 -q -O /dev/null http://localhost:8090/actuator/health/liveness || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s
    networks:
      - backend-network
      - db-network
      - observability-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 256M

  # ----------------------------------------------------------
  # Frontend (Nginx static build)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -T10 -q -O /dev/null http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - dmz-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

volumes:
  postgres_data:
  loki_data:
  grafana_data:

# ============================================================
# Network Segmentation – Defense in Depth
# ============================================================
# dmz-network:          Frontend + API Gateway (public-facing layer)
# gateway-network:      API Gateway + Redis + Auth Service (rate limiting & session cache)
# backend-network:      All microservices + Config Server + Prometheus/Zipkin (internal API mesh)
# db-network:           PostgreSQL + microservices only (transactional data, no external access)
# observability-network: Loki, Grafana, Prometheus, Zipkin + services exposing metrics
# ============================================================
networks:
  dmz-network:
    driver: bridge
  gateway-network:
    driver: bridge
  backend-network:
    driver: bridge
  db-network:
    driver: bridge
  observability-network:
    driver: bridge
