# Grafana — Provisioning datasource Loki
# GAP-4: aggregazione audit log Hotel PMS
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 5000
      timeout: 60
