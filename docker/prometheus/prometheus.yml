global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "config-server"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["config-server:8090"]

  - job_name: "api-gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8090"]

  - job_name: "auth-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-service:8090"]

  - job_name: "guest-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["guest-service:8090"]

  - job_name: "frontdesk-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["frontdesk-service:8090"]

  - job_name: "billing-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["billing-service:8090"]

  - job_name: "fb-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["fb-service:8090"]
