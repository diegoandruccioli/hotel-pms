global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "config-server"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["config-server:8888"]

  - job_name: "api-gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: "auth-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-service:8087"]

  - job_name: "guest-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["guest-service:8083"]

  - job_name: "inventory-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["inventory-service:8081"]

  - job_name: "reservation-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["reservation-service:8082"]

  - job_name: "stay-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["stay-service:8084"]

  - job_name: "billing-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["billing-service:8085"]

  - job_name: "fb-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["fb-service:8086"]
