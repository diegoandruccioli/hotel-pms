server:
  port: 8086

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_fb
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always


# Internal HMAC security - injected by setup-hmac-secret script
internal:
  hmac:
    secret: ${INTERNAL_HMAC_SECRET}
