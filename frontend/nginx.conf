server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers — T-FE-04 / T-GW-03 ─────────────────────────────────
    #
    # Content-Security-Policy for the React SPA:
    #   - script-src 'self'            : only same-origin bundles (Vite output)
    #   - style-src 'self' 'unsafe-inline' : TailwindCSS injects utility classes
    #                                        at runtime; inline styles are required
    #   - img-src 'self' data:         : allows SVG/PNG assets and base64 data URIs
    #   - connect-src 'self'           : API calls are same-origin via /api proxy
    #   - frame-ancestors 'none'       : blocks all iframe embedding (clickjacking)
    #   - form-action 'self'           : form submissions only to same origin
    #   - base-uri 'self'              : prevents <base> tag injection
    #   - default-src adds blob:      : <a download> fetches generated via
    #                                    URL.createObjectURL (invoice PDF export)
    #                                    resolve against default-src; without
    #                                    blob: Chrome silently drops the download
    #                                    with no console error.
    #
    # NOTE — nginx add_header inheritance gotcha: a location block that sets its
    # OWN add_header (Cache-Control, below) silently drops ALL server-level
    # add_header directives for that location — nginx only inherits add_header
    # from the parent context when the child defines none of its own. That
    # silently disabled every header below on "/" and "/assets/" (the only two
    # locations that set Cache-Control) while still applying correctly to
    # "/api/" (no own add_header there). Fixed by repeating this set inside
    # both of those location blocks instead of relying on inheritance.
    add_header Content-Security-Policy
        "default-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'"
        always;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # HSTS — only effective over TLS; harmless over HTTP (ignored by browsers).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Use Docker's embedded DNS so nginx resolves upstream hostnames at request
    # time rather than at startup — allows nginx to start even when api-gateway
    # is not running (e.g., CI runs only the frontend container with --no-deps).
    resolver 127.0.0.11 valid=10s;

    # ── API reverse proxy — same-origin routing for CSP compliance ────────────
    #
    # All /api/* requests are forwarded to the API Gateway inside the Docker
    # network. This keeps API calls same-origin from the browser's perspective,
    # satisfying connect-src 'self' in the CSP above.
    location /api/ {
        set $upstream       http://api-gateway:8080;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Hashed build assets (filename changes on every build) — safe to cache
    # indefinitely; immutable tells the browser to skip revalidation entirely.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Content-Security-Policy
            "default-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'"
            always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    # ── SPA fallback — client-side routing support ────────────────────────────
    #
    # index.html must never be cached: it references the current build's
    # hashed asset filenames. A cached index.html surviving past a deploy
    # points at deleted assets, leaving the browser with a blank page and a
    # MIME-type console error instead of the new build.
    location / {
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy
            "default-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'"
            always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ /index.html;
    }
}
