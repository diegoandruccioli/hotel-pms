server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers — T-FE-04 / T-GW-03 ─────────────────────────────────
    #
    # Content-Security-Policy for the React SPA:
    #   - script-src 'self'            : only same-origin bundles (Vite output)
    #   - style-src 'self' 'unsafe-inline' : TailwindCSS injects utility classes
    #                                        at runtime; inline styles are required
    #   - img-src 'self' data:         : allows SVG/PNG assets and base64 data URIs
    #   - connect-src 'self'           : API calls are same-origin via /api proxy
    #   - frame-ancestors 'none'       : blocks all iframe embedding (clickjacking)
    #   - form-action 'self'           : form submissions only to same origin
    #   - base-uri 'self'              : prevents <base> tag injection
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'"
        always;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # HSTS — only effective over TLS; harmless over HTTP (ignored by browsers).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API reverse proxy — same-origin routing for CSP compliance ────────────
    #
    # All /api/* requests are forwarded to the API Gateway inside the Docker
    # network. This keeps API calls same-origin from the browser's perspective,
    # satisfying connect-src 'self' in the CSP above.
    location /api/ {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback — client-side routing support ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
