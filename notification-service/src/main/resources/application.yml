spring:
  application:
    name: notification-service
  config:
    import: "configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    config:
      username: ${CONFIG_SERVER_USERNAME:configuser}
      password: ${CONFIG_SERVER_PASSWORD}

eureka:
  client:
    enabled: false

internal:
  hmac:
    secret: ${INTERNAL_HMAC_SECRET}
